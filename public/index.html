<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiss, or Dual Monitors - 诊断版</title>
  <style>
    body { font-family: sans-serif; background: #000; color: #fff; padding: 20px; text-align: center; }
    .card { background: #181818; border-radius: 12px; padding: 15px; margin: 15px auto; max-width: 400px; border: 1px solid #333; }
    button { width: 100%; padding: 16px; margin: 8px 0; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-test { background: #9b59b6; color: white; }
    .btn-vibrate { background: #e74c3c; color: white; }
    .btn-green { background: #2ecc71; color: white; }
    .btn-red { background: #e67e22; color: white; }
    #log { background: #000; color: #00ff00; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 12px; text-align: left; height: 120px; overflow-y: auto; border: 1px solid #444; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>Kiss, or Dual Monitors</h2>
  
  <div class="card">
    <div>模式：<span id="role-text">...</span></div>
    <div id="status" style="font-size: 13px; color: #aaa; margin-top: 5px;">连接中...</div>
  </div>

  <div class="card">
    <h3 style="color: #00f0ff;">1. 本地震动强制诊断测试</h3>
    <button class="btn-test" onclick="testDirectVibrate(500)">单次震动 (500ms)</button>
    <button class="btn-test" onclick="testDirectVibrate(1000)">强力震动 (1000ms)</button>
  </div>

  <div id="control-panel" class="card" style="display: none;">
    <h3>2. 云端广播测试</h3>
    <button class="btn-vibrate" onclick="sendCommand('VIBRATE_PHONE')">发送手机震动指令</button>
  </div>

  <div class="card">
    <h3>运行日志诊断</h3>
    <div id="log">等待操作...<br></div>
  </div>

  <div style="margin-top: 20px; font-size: 12px;">
    <a href="?role=display" style="color: #ff0055;">[切换为展场接收端]</a> | 
    <a href="?role=control" style="color: #00f0ff;">[切换为控制端]</a>
  </div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg) {
      logEl.innerHTML += `> ${msg}<br>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role') || 'display';
    document.getElementById('role-text').innerText = role === 'display' ? '展场接收端' : '控制端';
    
    if (role === 'control') {
      document.getElementById('control-panel').style.display = 'block';
    }

    // 检查浏览器 API 支持情况
    if ('vibrate' in navigator) {
      log('✅ 浏览器支持 navigator.vibrate API');
    } else {
      log('❌ 当前浏览器完全不支持 navigator.vibrate');
    }

    // 本地直接震动测试（诊断函数）
    function testDirectVibrate(ms) {
      if (!('vibrate' in navigator)) {
        log('❌ 无法震动：API 不存在');
        return;
      }
      try {
        // 采用最标准的单数字传参
        const success = navigator.vibrate(ms);
        log(`调用 vibrate(${ms}) -> 返回值: ${success}`);
        if (!success) {
          log('⚠️ 浏览器拒绝了震动请求(返回false)，可能是权限或静音模式拦截');
        }
      } catch (e) {
        log(`❌ 抛出异常: ${e.message}`);
      }
    }

    // WebSocket 逻辑
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}`);

    ws.onopen = () => {
      document.getElementById('status').innerText = '✅ WebSocket 已连接';
      log('WebSocket 已建立');
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      log(`收到广播: ${data.action}`);

      if (role === 'display' && data.action === 'VIBRATE_PHONE') {
        testDirectVibrate(600); // 接收到云端指令后触发 600ms 震动
      }
    };

    function sendCommand(action) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: action }));
        log(`已发送指令: ${action}`);
      }
    }
  </script>
</body>
</html>
