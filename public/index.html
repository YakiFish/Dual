<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiss, or Dual Monitors - 控制台</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; text-align: center; }
    button { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-vibrate { background: #e74c3c; color: white; }
    .btn-green { background: #2ecc71; color: white; }
    .btn-red { background: #e67e22; color: white; }
    #status { margin-top: 20px; color: #888; font-size: 14px; }
  </style>
</head>
<body>

  <h2> Kiss, or Dual Monitors </h2>
  <p>设备模式：<span id="role-text">等待连接...</span></p>

  <hr style="border-color: #333; margin: 20px 0;">

  <!-- 控制端按钮 -->
  <h3>观众/控制端操作面板</h3>
  <button class="btn-vibrate" onclick="sendCommand('VIBRATE_PHONE')">触感脉冲 (手机震动)</button>
  <button class="btn-green" onclick="sendCommand('HEART_GREEN')">寻脉光波 (手环绿光)</button>
  <button class="btn-red" onclick="sendCommand('SPO2_RED')">血氧检测 (手环红光)</button>

  <div id="status">WebSocket 连接中...</div>

  <script>
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    const ws = new WebSocket(wsUrl);

    const statusDiv = document.getElementById('status');

    ws.onopen = () => {
      statusDiv.innerText = '✅ WebSocket 已安全连接 (WSS)';
      statusDiv.style.color = '#2ecc71';
    };

    ws.onclose = () => {
      statusDiv.innerText = '❌ 连接已断开，刷新页面重试';
      statusDiv.style.color = '#e74c3c';
    };

    // 发送指令给服务端
    function sendCommand(action) {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: action, timestamp: Date.now() }));
      }
    }

    // 接收服务端广播的指令（作为展场手机运行）
    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      console.log('接收到广播指令:', data);

      // 如果接收端是安卓手机，且收到震动指令
      if (data.action === 'VIBRATE_PHONE') {
        if ('vibrate' in navigator) {
          // 触感模式：震动 200ms -> 停 100ms -> 震动 400ms
          navigator.vibrate([200, 100, 400]);
        }
      }
    };
  </script>
</body>
</html>
